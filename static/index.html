<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Go Real-Time Chat</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{

            height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            background: linear-gradient(
                135deg,
                #667eea,
                #764ba2,
                #6B73FF
            );

            padding:20px;
        }

        .container{

            width:100%;

            max-width:750px;

            background: rgba(255,255,255,0.12);

            backdrop-filter: blur(15px);

            border:1px solid rgba(255,255,255,0.2);

            border-radius:24px;

            padding:24px;

            box-shadow:
                0 8px 32px rgba(0,0,0,0.2);
        }

        h1{

            text-align:center;

            color:white;

            margin-bottom:20px;

            font-size:34px;
        }

        #online{

            color:#d1ffd6;

            text-align:center;

            margin-bottom:20px;

            font-size:14px;
        }

        .top{

            display:flex;

            gap:10px;

            margin-bottom:20px;
        }

        .top input{

            flex:1;
        }

        input{

            padding:14px;

            border:none;

            outline:none;

            border-radius:14px;

            background: rgba(255,255,255,0.18);

            color:white;

            font-size:15px;
        }

        input::placeholder{
            color:#eee;
        }

        button{

            border:none;

            padding:14px 24px;

            border-radius:14px;

            background:white;

            color:#6B73FF;

            font-weight:bold;

            cursor:pointer;

            transition:0.3s;
        }

        button:hover{

            transform:translateY(-2px);

            opacity:0.92;
        }

        #chat{

            height:420px;

            overflow-y:auto;

            padding:15px;

            border-radius:18px;

            background: rgba(255,255,255,0.08);

            margin-bottom:20px;
        }

        #chat::-webkit-scrollbar{
            width:6px;
        }

        #chat::-webkit-scrollbar-thumb{

            background:white;

            border-radius:10px;
        }

        .message{

            padding:14px;

            margin-bottom:14px;

            border-radius:16px;

            background: rgba(255,255,255,0.16);

            color:white;

            line-height:1.6;

            animation:fadeIn 0.3s ease;
        }

        .system{

            background: rgba(255,221,87,0.25);

            border-left:4px solid #FFD43B;
        }

        .time{

            font-size:11px;

            opacity:0.8;
        }

        .bottom{

            display:flex;

            gap:10px;
        }

        .bottom input{
            flex:1;
        }

        @keyframes fadeIn{

            from{
                opacity:0;
                transform:translateY(10px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>Go Real-Time Chat</h1>

        <div id="online">
            0 users online
        </div>

        <div class="top">

            <input
                type="text"
                id="username"
                placeholder="Enter username"
            >

            <button onclick="connectUser()">
                Join
            </button>

        </div>

        <div id="chat"></div>

        <div class="bottom">

            <input
                type="text"
                id="message"
                placeholder="Type message..."
            >

            <button onclick="sendMessage()">
                Send
            </button>

        </div>

    </div>

    <script>

        let socket;

        function connectUser(){

            const username =
                document.getElementById("username").value;

            if(username === ""){
                alert("Enter username");
                return;
            }

            socket =
                new WebSocket("ws://localhost:3000/ws");

            socket.onopen = function(){

                socket.send(
                    JSON.stringify(username)
                );
            };

            socket.onmessage = function(event){

                const data =
                    JSON.parse(event.data);

                if(data.type === "online"){

                    document.getElementById("online")
                        .innerText = data.content;

                    return;
                }

                const chat =
                    document.getElementById("chat");

                const div =
                    document.createElement("div");

                div.classList.add("message");

                if(data.type === "system"){
                    div.classList.add("system");
                }

                div.innerHTML = `
                    <strong>${data.user}</strong>

                    <span class="time">
                        (${data.time})
                    </span>

                    <br>

                    ${data.content}
                `;

                chat.appendChild(div);

                chat.scrollTop =
                    chat.scrollHeight;
            };
        }

        function sendMessage(){

            const username =
                document.getElementById("username").value;

            const message =
                document.getElementById("message").value;

            if(message === ""){
                return;
            }

            socket.send(JSON.stringify({

                type: "message",

                user: username,

                content: message
            }));

            document.getElementById("message").value = "";
        }

    </script>

</body>

</html>
